seed: 42

data:
  test_size: 0.2
  target_column: outcome
  output_path: data/raw/heart_disease.csv

model:
  type: random_forest
  n_estimators: 200
  max_depth: 8
  min_samples_split: 4
  min_samples_leaf: 2

artifacts:
  model_path: artifacts/model.joblib
  metrics_path: artifacts/metrics.json
  predictions_path: artifacts/predictions.csv
  environment_path: artifacts/environment.json
  config_snapshot_path: artifacts/config_snapshot.yaml
