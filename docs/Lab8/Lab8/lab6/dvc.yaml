stages:
  data_pipeline:
    cmd: python pipelines/data_pipeline.py
    deps:
      - pipelines/data_pipeline.py
      - params.yaml
    params:
      - seed
      - data.target_column
      - data.raw_path
      - data.processed_train_path
      - data.processed_test_path
      - data.test_size
    outs:
      - data/raw/breast_cancer.csv
      - data/processed/train.csv
      - data/processed/test.csv

  training_pipeline:
    cmd: python pipelines/training_pipeline.py
    deps:
      - pipelines/training_pipeline.py
      - params.yaml
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - seed
      - training.model_type
      - training.n_estimators
      - training.max_depth
      - training.min_samples_split
      - training.min_samples_leaf
      - training.model_path
      - training.metrics_path
    outs:
      - artifacts/model.joblib
    metrics:
      - artifacts/training_metrics.json

  deployment_pipeline:
    cmd: python pipelines/deployment_pipeline.py
    deps:
      - pipelines/deployment_pipeline.py
      - params.yaml
      - artifacts/model.joblib
    params:
      - deployment.deployed_model_path
    outs:
      - deployment/current/model.joblib
