services:
  redis:
    image: redis:7-alpine
    container_name: lab5_redis
    ports:
      - "6379:6379"

  api:
    image: python:3.10-slim
    container_name: lab5_fastapi
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis
