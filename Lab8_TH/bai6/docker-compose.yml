services:
  mlflow:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && mlflow ui --backend-store-uri file:./mlruns --host 0.0.0.0 --port 5005"
    ports:
      - "5005:5005"
  api:
    build: .
    ports:
      - "8002:8002"
